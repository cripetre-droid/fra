<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="FRA — emblemă crap">
  <defs>
    <linearGradient id="b-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141b21"/>
      <stop offset="1" stop-color="#070a0d"/>
    </linearGradient>
    <linearGradient id="b-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d488"/>
      <stop offset="0.5" stop-color="#c8a24a"/>
      <stop offset="1" stop-color="#8a6a28"/>
    </linearGradient>
    <linearGradient id="b-fish" x1="0" y1="-90" x2="0" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecce80"/>
      <stop offset="1" stop-color="#a07e35"/>
    </linearGradient>
    <clipPath id="b-clip">
      <path d="M-150 4 C -126 -58, -40 -86, 52 -78 C 100 -72, 132 -40, 144 0 C 132 40, 100 72, 52 78 C -40 86, -126 58, -150 -4 C -157 -1, -157 1, -150 4 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#b-water)"/>

  <!-- medallion -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="url(#b-ring)" stroke-width="12"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="#c8a24a" stroke-width="3" opacity="0.55"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#0a0d10" stroke-width="6"/>

  <!-- top wordmark FRA on an arc (coborât: rază mai mică ca să nu atingă inelul) -->
  <path id="b-top" d="M 110 256 A 146 146 0 0 1 402 256" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#e6c56f"
        font-size="46" letter-spacing="16" text-anchor="middle">
    <textPath href="#b-top" startOffset="50%">FRA</textPath>
  </text>
  <!-- bottom tagline -->
  <path id="b-bot" d="M 96 268 A 164 164 0 0 0 416 268" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="600" fill="#c8a24a"
        font-size="25" letter-spacing="6" text-anchor="middle">
    <textPath href="#b-bot" startOffset="50%">JURNAL DE PESCUIT</textPath>
  </text>
  <!-- side stars -->
  <g fill="#c8a24a">
    <path d="M112 256 l6 -11 6 11 -6 11 z"/>
    <path d="M400 256 l6 -11 6 11 -6 11 z"/>
  </g>

  <!-- carp centered -->
  <g transform="translate(256 252) scale(0.9)">
    <path d="M132 0 C 176 -56, 198 -64, 202 -56 C 182 -34, 182 34, 202 56 C 198 64, 176 56, 132 0 Z"
          fill="url(#b-fish)" stroke="#4f3d10" stroke-width="5" stroke-linejoin="round"/>
    <path d="M-30 -60 C 8 -126, 84 -130, 118 -70 C 80 -84, 12 -80, -30 -60 Z"
          fill="url(#b-fish)" stroke="#4f3d10" stroke-width="5" stroke-linejoin="round"/>
    <path d="M-40 40 C -24 90, 34 100, 56 66 C 20 74, -16 64, -40 40 Z"
          fill="url(#b-fish)" stroke="#4f3d10" stroke-width="5" stroke-linejoin="round"/>
    <path d="M-150 4 C -126 -58, -40 -86, 52 -78 C 100 -72, 132 -40, 144 0 C 132 40, 100 72, 52 78 C -40 86, -126 58, -150 -4 C -157 -1, -157 1, -150 4 Z"
          fill="url(#b-fish)" stroke="#4f3d10" stroke-width="6" stroke-linejoin="round"/>
    <g clip-path="url(#b-clip)" fill="none" stroke="#6f5416" stroke-width="2.6" opacity="0.5" stroke-linecap="round">
      <path d="M-112 -58 q20 20 0 40 M-72 -58 q20 20 0 40 M-32 -58 q20 20 0 40 M8 -58 q20 20 0 40 M48 -58 q20 20 0 40 M88 -58 q20 20 0 40"/>
      <path d="M-132 -18 q20 20 0 40 M-92 -18 q20 20 0 40 M-52 -18 q20 20 0 40 M-12 -18 q20 20 0 40 M28 -18 q20 20 0 40 M68 -18 q20 20 0 40 M108 -18 q20 20 0 40"/>
      <path d="M-112 22 q20 20 0 40 M-72 22 q20 20 0 40 M-32 22 q20 20 0 40 M8 22 q20 20 0 40 M48 22 q20 20 0 40 M88 22 q20 20 0 40"/>
    </g>
    <path d="M-114 -48 C -132 -16, -132 16, -114 48" fill="none" stroke="#6f5416" stroke-width="4" opacity="0.8"/>
    <path d="M-148 8 C -164 20, -172 30, -178 44" fill="none" stroke="#4f3d10" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-120" cy="-16" r="12" fill="#1a1006"/>
    <circle cx="-124" cy="-20" r="4" fill="#fff" opacity="0.9"/>
  </g>
</svg>
